name: Weekly Roadmap Task Breakdown

on:
  schedule:
    - cron: '0 9 * * 6'  # Every Saturday at 9am UTC
  workflow_dispatch:

jobs:
  breakdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate TASKS.md
        run: python3 scripts/extract_roadmap_tasks.py > TASKS.md

      - name: Open PR if TASKS.md changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/weekly-roadmap-tasks
          title: "chore: weekly roadmap task breakdown"
          body: |
            Automated weekly breakdown of incomplete roadmap items from `README.md`.

            Review each section and tick off tasks as they are completed.
          commit-message: "chore: update roadmap task breakdown"
          labels: roadmap, automated
