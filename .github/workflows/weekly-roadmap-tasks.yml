name: Weekly Roadmap Task Breakdown

on:
  schedule:
    - cron: '0 9 * * 6'
      timezone: 'Asia/Ho_Chi_Minh'
  workflow_dispatch:

jobs:
  breakdown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Analyze roadmap and create GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/extract_roadmap_tasks.py
