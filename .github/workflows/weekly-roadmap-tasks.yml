name: Weekly Roadmap Task Breakdown

on:
  schedule:
    - cron: '0 9 * * 6'  # Every Saturday at 9am UTC
  workflow_dispatch:

jobs:
  breakdown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Issues for incomplete roadmap tasks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/extract_roadmap_tasks.py
